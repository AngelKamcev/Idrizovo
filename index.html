<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>За Нас - Дизајн</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-black">

    <div class="bg-[#2e589e] text-[12px] py-2 px-6 md:px-40 flex justify-between items-center text-white">
        <div class="flex flex-wrap items-center gap-4 md:space-x-10">
            <div class="flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
                <span>02 25 80 312</span>
            </div>
            <div class="hidden sm:flex items-center space-x-2 border-white/20 md:pl-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
                <span>kpuidrizovo@kpuidrizovo.gov.mk</span>
            </div>
        </div>
        <div>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white cursor-pointer hover:opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
            </svg>
        </div>
    </div>

    <nav class="flex justify-between items-center px-6 md:px-40 py-5 bg-[#2e589e] border-b border-gray-300 text-white relative">
        
        <a href="#" class="flex items-center">
            <img src="logo.png" alt="Logo" class="h-10 w-auto object-contain">
        </a>

        <ul class="hidden md:flex space-x-10 text-sm font-medium">
            <li><a href="#" class="border-b-2 border-transparent hover:border-blue-300 hover:text-white pb-1 transition-all">Дома</a></li>
            <li><a href="#" class="border-b-2 border-transparent hover:border-blue-300 hover:text-white pb-1 transition-all">За нас</a></li>
            <li class="relative group">
                <button class="flex items-center border-b-2 border-transparent group-hover:border-blue-300 group-hover:text-white pb-1 transition-all outline-none">
                    <span>Новости и соопштенија</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1 transition-transform group-hover:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
                <div class="absolute left-0 mt-2 w-48 bg-white text-black rounded-md shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                    <div class="py-2">
                        <a href="#" class="block px-4 py-2 hover:bg-gray-100 transition-colors">Најнови вести</a>
                        <a href="#" class="block px-4 py-2 hover:bg-gray-100 transition-colors">Соопштенија</a>
                        <a href="#" class="block px-4 py-2 hover:bg-gray-100 transition-colors">Галерија</a>
                    </div>
                </div>
            </li>
            <li><a href="#" class="border-b-2 border-transparent hover:border-blue-300 hover:text-white pb-1 transition-all">Изработки</a></li>
            <li><a href="#" class="border-b-2 border-transparent hover:border-blue-300 hover:text-white pb-1 transition-all">Контакт</a></li>
        </ul>

        <div class="flex items-center space-x-5 md:space-x-6"> 
            
            <div class="relative flex items-center group h-10 w-6"> 
                <input 
                    type="text" 
                    placeholder="Пребарај..." 
                    class="absolute right-0 w-0 opacity-0 group-hover:w-40 md:group-hover:w-48 group-hover:opacity-100 group-hover:pr-10 py-2 border-b border-white bg-[#2e589e] text-white transition-all duration-300 focus:outline-none z-0"
                >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 cursor-pointer absolute right-0 text-white z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>

            <div class="md:hidden cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </div>

            <button class="hidden md:block bg-[#0e1b2f] text-white px-6 py-3 text-sm font-bold rounded-xl hover:bg-black transition shadow-md whitespace-nowrap">
                Закажи посета
            </button>
        </div>
    </nav>

    <div onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="text-white fixed bottom-10 right-10 bg-[#2e589e] p-3 rounded-full shadow-lg cursor-pointer hover:bg-[#0e1b2f] transition-all z-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
        </svg>
    </div>

</body>
</html>
